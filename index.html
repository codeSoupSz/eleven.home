<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>El's home</title>
    <link rel="icon" href="eleven/ico/chopper.ico" type="image/x-icon"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet"/>

    <style>
        :root {
            --font-display: "Cormorant Garamond", "Times New Roman", Times, serif;
            --bg-deep: #0a1219;
            --accent: rgb(37, 129, 62);
            --accent-hover: rgb(48, 158, 78);
            --text: rgba(255, 255, 255, 0.94);
            --muted: rgba(255, 255, 255, 0.55);
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
            --cup-outline: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            font-size: clamp(11px, 2.2vw, 14px);
            background-color: var(--bg-deep);
            background-image:
                radial-gradient(ellipse 100% 70% at 50% -15%, rgba(37, 129, 62, 0.28), transparent 55%),
                radial-gradient(ellipse 70% 50% at 100% 20%, rgba(1, 141, 237, 0.18), transparent 50%),
                radial-gradient(ellipse 60% 40% at 0% 80%, rgba(117, 74, 74, 0.12), transparent 45%),
                linear-gradient(165deg, #070d14 0%, #0f1a24 42%, #0a1219 100%);
            background-attachment: fixed;
            font-family: var(--font-display);
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(2.4rem, 6vw, 4rem) clamp(1.6rem, 5vw, 2.4rem);
            color: var(--text);
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }

        /* 咖啡杯外框：杯身裁剪 + 右侧杯把 */
        .coffee-mug-shell {
            width: 100%;
            max-width: 64rem;
            display: flex;
            justify-content: center;
            padding: 0 clamp(0.5rem, 3vw, 1.5rem);
        }

        .coffee-mug-inner {
            position: relative;
            width: 100%;
            max-width: 58rem;
            /* 右侧留给杯把，避免与内容重叠 */
            padding-right: clamp(3.5rem, 11vw, 5.5rem);
            animation: rise 0.85s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .hero-stack {
            position: relative;
            width: 100%;
            filter: drop-shadow(0 20px 48px rgba(0, 0, 0, 0.42));
        }

        .hero {
            margin: 0 auto;
            width: 100%;
            padding:
                clamp(3.2rem, 9vw, 5rem)
                clamp(2.4rem, 7vw, 4.5rem)
                clamp(3.5rem, 9vw, 5.2rem);
            border-radius: 0;
            background: linear-gradient(
                165deg,
                rgba(7, 13, 20, 0.9) 0%,
                rgba(12, 22, 34, 0.82) 50%,
                rgba(8, 14, 22, 0.88) 100%
            );
            border: none;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06) inset;
            color: var(--text);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            -webkit-clip-path: url(#clip-mug);
            clip-path: url(#clip-mug);
        }

        /* 与 clip 同形的白色杯沿（仅描边，不挡内容） */
        .mug-stroke {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: visible;
        }

        .mug-stroke path {
            fill: none;
            stroke: var(--cup-outline);
            stroke-width: 2.25;
            stroke-linecap: round;
            stroke-linejoin: round;
            vector-effect: non-scaling-stroke;
        }

        .mug-handle {
            position: absolute;
            top: 32%;
            right: clamp(0.5rem, 2.5vw, 1.25rem);
            width: clamp(2.6rem, 7.5vw, 3.8rem);
            height: clamp(4.4rem, 13vw, 7rem);
            border: 0.38em solid rgba(255, 255, 255, 0.92);
            border-left: none;
            border-radius: 0 50% 50% 0 / 0 48% 48% 0;
            pointer-events: none;
            box-shadow: inset -5px 0 14px rgba(0, 0, 0, 0.15);
            z-index: 2;
        }

        .mug-handle::after {
            content: "";
            position: absolute;
            inset: 22% 15% 22% -10%;
            border-radius: inherit;
            border: 0.1em solid rgba(255, 255, 255, 0.25);
            border-left: none;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            margin: 0 0 clamp(0.6rem, 2vw, 1rem);
            font-family: var(--font-display);
            font-weight: 600;
            font-size: clamp(3.4rem, 8.5vw, 5.8rem);
            line-height: 1.08;
            letter-spacing: 0.01em;
            font-feature-settings: "kern" 1;
            background: linear-gradient(120deg, #fff 0%, rgba(255, 255, 255, 0.82) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero .tagline {
            margin: 0 0 clamp(2.6rem, 5vw, 3.6rem);
            font-size: clamp(1.85rem, 3.6vw, 2.45rem);
            font-weight: 500;
            font-style: italic;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(1rem, 3vw, 1.4rem);
            justify-content: center;
        }

        a.button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 6.8rem;
            min-width: min(20rem, 100%);
            padding: 0 2.8rem;
            border: none;
            border-radius: 999px;
            font-family: var(--font-display);
            font-size: clamp(2.15rem, 4vw, 2.85rem);
            font-weight: 600;
            letter-spacing: 0.06em;
            text-decoration: none;
            color: #f0faf3;
            background: linear-gradient(145deg, var(--accent) 0%, rgb(28, 105, 52) 100%);
            box-shadow:
                0 4px 0 rgb(22, 85, 42),
                0 12px 32px rgba(0, 0, 0, 0.35);
            cursor: pointer;
            transition:
                transform 0.2s ease,
                box-shadow 0.2s ease,
                background 0.2s ease,
                color 0.2s ease;
        }

        a.button:hover {
            color: rgb(60, 42, 42);
            background: linear-gradient(145deg, #ffffff 0%, #e8f5ec 100%);
            box-shadow:
                0 4px 0 rgba(200, 200, 200, 0.5),
                0 16px 40px rgba(0, 0, 0, 0.28);
            transform: translateY(-2px);
        }

        a.button:active {
            transform: translateY(1px);
            box-shadow:
                0 2px 0 rgb(22, 85, 42),
                0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .hero a.button:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.85);
            outline-offset: 4px;
        }

        .hero a.button-secondary {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0.06) 100%);
            color: var(--text);
            box-shadow:
                0 0 0 1px var(--glass-border) inset,
                0 12px 32px rgba(0, 0, 0, 0.25);
        }

        .hero a.button-secondary:hover {
            color: rgb(60, 42, 42);
            background: linear-gradient(145deg, #ffffff 0%, #eef4f8 100%);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.4) inset,
                0 16px 40px rgba(0, 0, 0, 0.22);
        }

        .hero a.button-secondary:active {
            box-shadow:
                0 0 0 1px var(--glass-border) inset,
                0 8px 20px rgba(0, 0, 0, 0.28);
        }

        footer {
            margin-top: auto;
            padding-top: clamp(2rem, 5vw, 3rem);
            font-size: clamp(1.55rem, 2.9vw, 1.95rem);
            font-style: italic;
            color: var(--muted);
            animation: rise 0.85s 0.12s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        footer p {
            margin: 0;
        }

        @media (prefers-reduced-motion: reduce) {
            .coffee-mug-inner,
            footer {
                animation: none;
            }
            a.button {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div class="coffee-mug-shell">
        <svg width="0" height="0" aria-hidden="true" focusable="false">
            <defs>
                <clipPath id="clip-mug" clipPathUnits="objectBoundingBox">
                    <!-- 侧视咖啡杯：杯口加宽、内壁留白，减少裁切标题与按钮 -->
                    <path
                        d="M0.04,0.93 Q0.5,0.99 0.96,0.93 L0.92,0.29 Q0.86,0.06 0.5,0.03 Q0.14,0.06 0.08,0.29 Z"
                    />
                </clipPath>
            </defs>
        </svg>
        <div class="coffee-mug-inner">
            <div class="hero-stack">
                <main class="hero" role="main">
                    <h1>Welcome to eleven's home</h1>
                    <p class="tagline">Have a look around.</p>
                    <div class="actions">
                        <a class="button" href="eleven/subpage/coffee_back.html">Coffee</a>
                        <a class="button button-secondary" href="eleven/subpage/bilibili.html">Video</a>
                    </div>
                </main>
                <svg class="mug-stroke" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true" focusable="false">
                    <path
                        d="M4,93 Q50,99 96,93 L92,29 Q86,6 50,3 Q14,6 8,29 Z"
                    />
                </svg>
            </div>
            <span class="mug-handle"></span>
        </div>
    </div>

    <footer>
        <p>Just something I like.</p>
    </footer>
</body>
</html>
